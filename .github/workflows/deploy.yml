name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e

            APP_DIR="/root/nexora-node/apps/nextools"

            echo "====================================="
            echo "🚀 STARTING DEPLOYMENT"
            echo "====================================="

            echo ""
            echo "📂 Entering application directory..."
            cd $APP_DIR

            echo ""
            echo "📥 Pulling latest source from GitHub..."
            git fetch origin main
            git reset --hard origin/main

            echo ""
            echo "🖥️ System memory info:"
            free -h

            echo ""
            echo "💾 Checking swap..."

            if ! swapon --show | grep -q "/swapfile"; then
              echo "⚠️ No swap detected. Creating 2GB swap..."

              fallocate -l 2G /swapfile || dd if=/dev/zero of=/swapfile bs=1M count=2048

              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile

              echo "/swapfile none swap sw 0 0" >> /etc/fstab

              echo "✅ Swap created successfully"
            else
              echo "✅ Swap already exists"
            fi

            echo ""
            echo "🖥️ Updated memory info:"
            free -h

            echo ""
            echo "🔨 Building frontend..."
            cd $APP_DIR/auth-client

            echo ""
            echo "📦 Installing dependencies..."

            if [ -f package-lock.json ]; then
              npm ci --prefer-offline
            else
              npm install
            fi

            echo ""
            echo "⚙️ Setting Node memory..."
            export NODE_OPTIONS="--max-old-space-size=2048"

            echo ""
            echo "🏗️ Running production build..."
            npm run build -- --debug

            echo ""
            echo "🐳 Rebuilding Docker containers..."
            cd $APP_DIR

            docker compose up -d --build

            echo ""
            echo "🧹 Cleaning old Docker images..."
            docker image prune -f

            echo ""
            echo "📦 Running containers:"
            docker ps

            echo ""
            echo "====================================="
            echo "✅ DEPLOY SUCCESS"
            echo "🌐 https://nextools.nexoratech.co"
            echo "====================================="

      - name: Notify success
        if: success()
        run: |
          echo "✅ Deployment successful"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deployment failed"
