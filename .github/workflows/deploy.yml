name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy NEXTOOLS to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script_stop: true
          debug: true
          timeout: 120s
          command_timeout: 30m
          script: |
            set -e

            APP_DIR="/root/nexora-node/apps/nextools"

            echo "====================================="
            echo "🚀 STARTING NEXTOOLS DEPLOYMENT"
            echo "====================================="

            echo "👤 Connected as:"
            whoami

            echo "🖥️ Hostname:"
            hostname

            echo "📂 Entering application directory..."
            cd "$APP_DIR"

            echo "📍 Current directory:"
            pwd

            echo "📥 Pulling latest source from GitHub..."
            git fetch origin main
            git reset --hard origin/main

            echo "🖥️ System memory info:"
            free -h

            echo "🔨 Building frontend..."
            cd "$APP_DIR/auth-client"

            echo "📦 Installing dependencies..."
            if [ -f package-lock.json ]; then
              npm ci --prefer-offline
            else
              npm install
            fi

            echo "⚙️ Setting Node memory..."
            export NODE_OPTIONS="--max-old-space-size=2048"

            echo "🏗️ Running production build..."
            npm run build

            echo "🐳 Rebuilding Docker containers..."
            cd "$APP_DIR"
            docker compose up -d --build

            echo "🧹 Cleaning old Docker images..."
            docker image prune -f

            echo "📦 Running containers:"
            docker compose ps

            echo "====================================="
            echo "✅ DEPLOY NEXTOOLS SUCCESS"
            echo "🌐 https://nextools.nexoratech.co"
            echo "====================================="

      - name: Notify success
        if: success()
        run: echo "✅ Deployment successful"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed"
