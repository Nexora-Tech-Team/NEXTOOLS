name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          timeout: 120s
          command_timeout: 30m
          debug: true
          script: |
            set -e

            APP_DIR="/root/nexora-node/apps/nextools"

            echo "====================================="
            echo "🚀 STARTING NEXTOOLS DEPLOYMENT"
            echo "====================================="

            echo "📂 Entering application directory..."
            cd "$APP_DIR"

            echo "📥 Pulling latest source from GitHub..."
            git fetch origin main
            git reset --hard origin/main

            echo "🖥️ System memory info:"
            free -h

            echo "🔨 Building frontend..."
            cd "$APP_DIR/auth-client"

            echo "📦 Installing dependencies..."
            if [ -f package-lock.json ]; then
              npm ci --prefer-offline
            else
              npm install
            fi

            echo "⚙️ Setting Node memory..."
            export NODE_OPTIONS="--max-old-space-size=2048"

            echo "🏗️ Running production build..."
            npm run build

            echo "🐳 Rebuilding Docker containers..."
            cd "$APP_DIR"
            docker compose up -d --build

            echo "🧹 Cleaning old Docker images..."
            docker image prune -f

            echo "📦 Running containers:"
            docker compose ps

            echo "✅ DEPLOY NEXTOOLS SUCCESS"
