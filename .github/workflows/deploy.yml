name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script_stop: true
          script: |
            set -e

            APP_DIR="/root/nexora-node/apps/nextools"

            echo "📦 Opening app directory..."
            cd $APP_DIR

            echo "📥 Pull latest source..."
            git fetch origin main
            git reset --hard origin/main

            echo "🔨 Build frontend..."
            cd $APP_DIR/auth-client

            if [ -f package-lock.json ]; then
              npm ci --prefer-offline
            else
              npm install
            fi

            npm run build

            echo "🐳 Rebuild docker containers..."
            cd $APP_DIR

            docker compose up -d --build

            echo "🧹 Cleanup old images..."
            docker image prune -f

            echo "✅ Deploy complete!"
            echo "🌐 https://nextools.nexoratech.co"

      - name: Notify success
        if: success()
        run: |
          echo "✅ Deployment successful"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deployment failed"
