services:

  nextools-frontend:
    image: nginx:alpine
    container_name: nextools-frontend
    restart: always

    volumes:
      - ./auth-client/dist:/usr/share/nginx/html
      - ./auth-client/nginx.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - nextools-backend

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextools.rule=Host(`nextools.nexoratech.co`)"
      - "traefik.http.routers.nextools.entrypoints=websecure"
      - "traefik.http.routers.nextools.tls.certresolver=myresolver"
      - "traefik.http.services.nextools.loadbalancer.server.port=80"

    networks:
      - web


  nextools-backend:
    image: golang:1.24
    container_name: nextools-backend
    working_dir: /app
    restart: always

    volumes:
      - ./auth-service:/app

    command: sh -c "export GOTOOLCHAIN=auto && go mod tidy && go run cmd/main.go"

    env_file:
      - ./auth-service/.env

    depends_on:
      - nextools-db

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextools-api.rule=Host(`api-nextools.nexoratech.co`)"
      - "traefik.http.routers.nextools-api.entrypoints=websecure"
      - "traefik.http.routers.nextools-api.tls.certresolver=myresolver"
      - "traefik.http.services.nextools-api.loadbalancer.server.port=8090"

    networks:
      - web


  nextools-db:
    image: postgres:16-alpine
    container_name: nextools-db
    restart: always

    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: authuser
      POSTGRES_PASSWORD: authpass

    volumes:
      - nextools-db-data:/var/lib/postgresql/data

    networks:
      - web


volumes:
  nextools-db-data:

networks:
  web:
    external: true
